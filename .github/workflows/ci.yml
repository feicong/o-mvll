name: 'O-MVLL CI'

on:
  push:
    branches:
      - main
    tags-ignore:
      - '**'
    paths-ignore:
      - 'LICENSE'
      - '**.md'
  workflow_dispatch:

concurrency:
  group: latest-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ndk:
    name: build-ndk
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Build NDK artifact
        shell: bash
        run: |
          curl -LO https://open-obfuscator.build38.io/static/omvll-deps-ndk-r26d.tar
          mkdir -p /tmp/third-party-ndk26
          tar xvf ./omvll-deps-ndk-r26d.tar --directory=/tmp/third-party-ndk26
          curl -LO https://www.python.org/ftp/python/3.10.7/Python-3.10.7.tgz
          tar xzvf Python-3.10.7.tgz --directory=${{ github.workspace }}/dist
          docker run --rm \
            -v /tmp/third-party-ndk26:/third-party \
            -v ${{ github.workspace }}/dist/Python-3.10.7:/Python-3.10.7 \
            -v $GITHUB_WORKSPACE:/o-mvll \
            openobfuscator/omvll-build:latest bash /o-mvll/scripts/docker/ndk_r26_compile.sh
      - name: Upload NDK artifact
        uses: actions/upload-artifact@v7
        with:
          name: ndk-release
          path: ${{ github.workspace }}/dist/omvll-ndk.so
          if-no-files-found: error

  build-xcode:
    name: build-xcode
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Build Xcode artifacts
        shell: bash
        run: |
          curl -LO https://open-obfuscator.build38.io/static/omvll-v1.4.0-macos-deps.tar
          mkdir -p /tmp/third-party-xcode16
          tar xvf ./omvll-v1.4.0-macos-deps.tar --directory=/tmp/third-party-xcode16
          docker run --rm \
            -v /tmp/third-party-xcode16/omvll-v1.4.0-macos-deps:/deps \
            -v $GITHUB_WORKSPACE:/o-mvll \
            openobfuscator/omvll-build:latest bash /o-mvll/scripts/docker/xcode_16_compile.sh
      - name: Prepare Xcode artifacts
        shell: bash
        run: |
          cp ${{ github.workspace }}/src/build_xcode/omvll-xcode_unsigned.dylib \
             ${{ github.workspace }}/src/build_xcode/omvll-xcode.dylib
      - name: Upload Xcode artifacts
        uses: actions/upload-artifact@v7
        with:
          name: xcode-release
          path: ${{ github.workspace }}/src/build_xcode/omvll-xcode.dylib
          if-no-files-found: error

  publish-release:
    name: publish-release
    runs-on: ubuntu-24.04
    needs:
      - build-ndk
      - build-xcode
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ github.workspace }}/release
          merge-multiple: true
      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p ${{ github.workspace }}/release-assets
          cp ${{ github.workspace }}/release/omvll-ndk.so \
             ${{ github.workspace }}/release-assets/omvll-android-arm64.so
          cp ${{ github.workspace }}/release/omvll-xcode.dylib \
             ${{ github.workspace }}/release-assets/omvll-macos-arm64.dylib
      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: false
          make_latest: true
          files: |
            ${{ github.workspace }}/release-assets/omvll-android-arm64.so
            ${{ github.workspace }}/release-assets/omvll-macos-arm64.dylib
          overwrite_files: true
